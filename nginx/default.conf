map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}
server {
    listen 80;


    location /activatedcarbon/ {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 1h;
            proxy_pass http://10.0.0.95:5174/activatedcarbon/;
            
    }

    location /nyra/ {
        proxy_pass http://localhost:5175/nyra;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://10.0.0.95:5173/;
        proxy_set_header Host $host;
    }
}
