server {
    listen 80;
    server_name _;

    # 🔐 Login app served at root "/"
    location / {
        alias /usr/share/nginx/html/root/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ✅ Serve activatedcarbon app at /activatedcarbon/
    location /activatedcarbon/ {
        alias /usr/share/nginx/html/activatedcarbon/;
        index index.html;
        try_files $uri $uri/ /activatedcarbon/index.html;
    }

    # 🔁 Backend API
    location /api/ {
        proxy_pass http://backend-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # 📦 Static logos for all tenants (e.g. /static-logos/samcarbon.webp)
    location /static-logos/ {
        alias /home/ubuntu/NYRAIAS/static-logos/;
        access_log off;
        autoindex off;
        expires 30d;
    }
}