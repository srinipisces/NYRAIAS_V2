version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: multi_tenant_nginx
    ports:
      - "80:80"
      - "443:443"  
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./tenants:/usr/share/nginx/html:ro
      - /home/ubuntu/NYRAIAS_V2/static-logos:/home/ubuntu/NYRAIAS_V2/static-logos:ro
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt  
    depends_on:
      - backend-api
    restart: always

  backend-api:
    build:
      context: ./backend-api
    container_name: multi_tenant_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend-api/.env     # ✅ Inject .env at runtime
    restart: always